<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman</title>
</head>

<style>

    body{
        background-color: black;
        padding: 10px;
        margin: 0 auto;
    }

    #result{
        position: fixed;
        top:50%;
        left:50%;
        transform: translate(-50%,-50%);
        background-color:rgb(100,100,100);
        padding: 20px;
        border: 2px solid white;
        visibility: hidden;
        text-align: center;
    }

    #win-text{
        font-size: 1.7cm;
        color: white;
        font-family: impact;
    }

    #score-text{
        color: white;
        text-align: center;
        margin-top: 20px;
        font-size: 20px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    canvas{
        display: block;
        margin: -80px auto;
    }

    #displayScore{
        color:white;
        font-family: Impact; 
        font-size: large; 
        visibility: hidden;
        margin: 70px 0 0 10px
    }

    #restart-btn{
        display: block;
        margin: 0 auto;
        padding:10px;
        background-color: black;
        color: white;
        border-radius: 10px;
        font-family:'Segoe UI';
        font-size: 20px;
        cursor: pointer;
        pointer-events:none;
    }

    #start-btn{
        position: fixed;
        top:50%;
        left:50%;
        transform: translate(-50%,-50%);
        font-size: 1cm;
        font-family:Tahoma;
        background-color: black;
        color: white;
        padding: 10px;
        cursor: pointer;
        border: 2px solid white;
    }

    #start-container{
        background-color: black;
        text-align: center;
    }
    
    #game-intro{
        font-size: 2cm;
        color: white;
        font-family: impact;
        position: relative;
        top: 100px;
    }

</style>

<body>

    <div id="start-container">
        <span id="game-intro">Pacman</span>
        <button type="button" id="start-btn">Play</button>
    </div>

    <div id="result">
        <p id="win-text"></p>
        <p id="score-text">Score: <span id="score-num"></span></p>
        <button type="button" id="restart-btn">Play Again</button>
    </div>

    <canvas></canvas>

    <p id="displayScore">
        <span>Score: </span>
        <span style="color:red" id="scoreDisplay">0</span> 
    </p>

    <script src="main.js"></script>

</body>
</html>
